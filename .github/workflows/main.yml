- name: Clean and Upgrade dependencies
        run: |
          flutter clean
          # مسح ملف الـ Lock القديم لإجبار فلاتر على إعادة حل الاعتماديات من الصفر
          rm -f pubspec.lock
          # تحديث كل الحزم لأحدث إصدارات متوافقة مع SDK 36
          flutter pub upgrade --major-versions
          flutter pub get
