name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'   # ✅ تحديد إصدار Flutter ثابت

      - name: Clean and Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Ensure compileSdk is 36
        run: |
          # ✅ تأكد من أن compileSdk و targetSdk مضبوطان على 36
          sed -i 's/compileSdk = 34/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/targetSdk = 34/targetSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/compileSdk 34/compileSdk 36/g' android/app/build.gradle
          sed -i 's/targetSdk 34/targetSdk 36/g' android/app/build.gradle

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
