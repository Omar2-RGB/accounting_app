name: accounting_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1
  http: ^1.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.10
  googleapis: ^13.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^0.4.5
  path_provider: ^2.1.6
  path: ^1.9.0
  pdf: ^3.13.0
  printing: ^5.15.0
  file_picker: ^8.1.4   # ✅ تم التغيير من ^11.0.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3   # ✅ أضف هذه الحزمة

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"          # مسار الصورة الأساسية (يجب أن تكون 1024×1024 بكسل)
  adaptive_icon_background: "#1A73E8"              # لون خلفية الأيقونة المتكيفة (Android)
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"  # اختياري، الصورة الأمامية للأيقونة المتكيفة
  remove_alpha_ios: true